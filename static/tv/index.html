<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1280, shrink-to-fit=yes" />
    <title>Menu TV</title>
    <link rel="stylesheet" href="/static/tv/tv.css" />
</head>

<body>
    <div class="menuCanvas">
        <header class="header">
            <div class="header__beers-label">BEERS<br>ON TAP</div>
            <div class="header__logo">
                <img src="/static/assets/GNARLY CEDAR/Logos/Letterpress Texture/Logo/Large/Khaki - Large.png" alt="Gnarly Cedar" />
            </div>
            <div class="header__beers-label">BEERS<br>ON TAP</div>
        </header>

        <main class="page">

            <div id="houseGrid" class="grid fadeSwap"></div>
            <div id="flightsRow" class="flightRow fadeSwap"></div>

            <div class="divider">
                <div class="sectionTitle">GUEST TAPS</div>
            </div>

            <div id="guestGrid" class="grid fadeSwap"></div>

            <div id="meta" class="meta"></div>

        </main>
    </div>

    <!-- Slide overlay — shown between menu cycles -->
    <div id="slideView" class="slideView slideView--hidden">
        <div class="slideInner">
            <header class="header">
                <div class="header__logo">
                    <img src="/static/assets/GNARLY CEDAR/Logos/Letterpress Texture/Logo/Large/Khaki - Large.png" alt="Gnarly Cedar" />
                </div>
            </header>
            <div id="slideTitle" class="slideTitle"></div>
            <div id="slideBody" class="slideBody"></div>
            <img id="slideImage" class="slideImage" alt="" />
        </div>
    </div>

    <!-- QR code (bottom-left corner) -->
    <div class="qrCorner">
        <div id="qrCode"></div>
        <div class="qrLabel">SCAN TO VIEW MENU</div>
    </div>

    <!-- Logo (bottom-right corner) -->
    <div class="logoCorner">
        <img src="/static/assets/GNARLY CEDAR/Logos/Symbol/digital/detailed cream/full color/gnarlycedar-detailed-cream-full-color-rgb-450px-w-72ppi.png" alt="GCB Logo" />
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="/static/tv/tv.js"></script>
</body>

</html>
