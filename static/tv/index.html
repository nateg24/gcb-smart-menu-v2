<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1280, shrink-to-fit=yes" />
    <title>Menu TV</title>
    <link rel="stylesheet" href="/static/tv/tv.css" />
</head>

<body>
    <div class="menuCanvas">
        <header class="header">
            <div class="header__title">GNARLY CEDAR BREWERY</div>
            <div class="header__sub">BEERS ON TAP BY GCB</div>
        </header>

        <main class="page">

            <div id="houseGrid" class="grid fadeSwap"></div>
            <div id="flightsRow" class="flightRow fadeSwap"></div>

            <div class="divider">
                <div class="sectionTitle">GUEST TAPS</div>
            </div>

            <div id="guestGrid" class="grid fadeSwap"></div>

            <div id="meta" class="meta"></div>

        </main>
    </div>

    <!-- QR code (bottom-left corner) -->
    <div class="qrCorner">
        <div id="qrCode"></div>
        <div class="qrLabel">SCAN TO VIEW MENU</div>
    </div>

    <!-- Logo (bottom-right corner) -->
    <div class="logoCorner">
        <img src="/static/assets/detailed-green.png" alt="GCB Logo" />
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="/static/tv/tv.js"></script>
</body>

</html>
