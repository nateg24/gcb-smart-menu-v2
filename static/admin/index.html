<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Menu Admin</title>
    <link rel="stylesheet" href="/static/admin/admin.css" />
</head>

<body>
    <!-- PIN lock screen -->
    <div id="pinOverlay" class="pinOverlay">
        <div class="pinCard">
            <div class="pinTitle">GCB Tap Menu Admin</div>
            <p class="pinSub">Enter staff PIN to continue</p>
            <input type="password" inputmode="numeric" maxlength="4" id="pinInput" class="pinInput" autocomplete="off" placeholder="••••" />
            <div id="pinError" class="pinError hidden">Incorrect PIN — try again</div>
            <button id="pinSubmit" class="btn primary pinBtn">Submit</button>
        </div>
    </div>

    <header class="topbar">
        <div class="title">Menu Admin</div>
        <div class="sub" id="meta">Loading…</div>
        <button class="btn" id="exportPdfBtn">Export PDF</button>
    </header>
    <main class="wrap">
        <section class="panel">
            <div class="panelHead">
                <h2>In House Taps</h2>
                <div style="display:flex;gap:8px;">
                    <button class="btn" id="addTapBtn">+ Add Tap</button>
                    <button class="btn danger" id="clearTapsBtn">Clear All Taps</button>
                </div>
            </div>
            <div id="houseTapGrid" class="tapGrid"></div>
            <div class="panelHead" style="margin-top:24px;margin-bottom:0;">
                <h2>Guest Taps</h2>
                <label class="guestToggle" id="guestToggleLabel">
                    <input type="checkbox" id="guestVisibleToggle" checked />
                    Show on TV
                </label>
            </div>
            <div id="guestTapGrid" class="tapGrid" style="margin-top:12px;"></div>
        </section>
        <section class="panel">
            <div class="panelHead">
                <h2>Beers</h2>
                <button class="btn" id="newBeerBtn">+ New Beer</button>
            </div>
            <div id="beerForm" class="card hidden"></div>
            <div id="beers" class="list"></div>
        </section>
        <section class="panel slidesPanel">
            <div class="panelHead">
                <h2>Slides</h2>
                <button class="btn" id="newSlideBtn">+ New Slide</button>
            </div>
            <div id="slideForm" class="hidden"></div>
            <div id="slidesList" class="list"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <script src="/static/admin/admin.js"></script>
</body>

</html>
